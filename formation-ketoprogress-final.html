<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Psycho-Nutrition — KétoProgress®</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --vp:#0b3d2e;--vm:#1a6b52;--vc:#e8f4f0;
  --or:#b5881e;--oc:#f5edd8;--cr:#f9f6f1;
  --tx:#1a1a1a;--td:#4a4a4a;--tl:#7a7a7a;
  --bo:#d8d2c8;--bl:#fff;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
}
body{font-family:var(--sans);color:var(--tx);background:var(--cr);font-size:15px;line-height:1.7;font-weight:300;}

/* LAYOUT */
.lms{display:grid;grid-template-columns:280px 1fr;min-height:100vh;}

/* SIDEBAR */
.sb{background:var(--vp);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:#fff;}
.sb-logo span{color:var(--or);}
.sb-subtitle{font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.sb-progress-wrap{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-progress-label{font-size:.68rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sb-progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;}
.sb-progress-fill{height:100%;background:var(--or);border-radius:2px;transition:width .4s;}
.sb-progress-pct{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:4px;}
.sb-nav{padding:10px 8px;flex:1;}
.sb-module{margin-bottom:4px;}
.sb-module-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:5px;cursor:pointer;background:none;border:none;font-family:var(--sans);text-align:left;transition:background .15s;}
.sb-module-btn:hover{background:rgba(255,255,255,.07);}
.sb-module-btn.active{background:rgba(181,136,30,.2);}
.sb-module-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;flex-shrink:0;}
.sb-module-icon.done{background:var(--vm);color:#fff;}
.sb-module-icon.current{background:var(--or);color:#fff;}
.sb-module-icon.locked{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);}
.sb-module-name{font-size:.78rem;color:rgba(255,255,255,.7);flex:1;}
.sb-module-btn.active .sb-module-name{color:#fff;font-weight:500;}
.sb-lessons{padding-left:18px;margin-bottom:4px;}
.sb-lesson{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:.74rem;color:rgba(255,255,255,.5);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);}
.sb-lesson:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05);}
.sb-lesson.active{color:#fff;background:rgba(255,255,255,.08);}
.sb-lesson.done{color:rgba(255,255,255,.6);}
.sb-lesson-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-lesson.done .sb-lesson-dot{background:var(--vm);}
.sb-lesson.active .sb-lesson-dot{background:var(--or);}
.sb-lesson:not(.done):not(.active) .sb-lesson-dot{background:rgba(255,255,255,.2);}
.sb-cert{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);}
.sb-cert-btn{width:100%;padding:.6rem;background:var(--or);color:var(--vp);border:none;border-radius:3px;font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;opacity:.4;}
.sb-cert-btn.enabled{opacity:1;}

/* MAIN */
.main{display:flex;flex-direction:column;}
.main-header{background:var(--bl);border-bottom:1px solid var(--bo);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.main-breadcrumb{font-size:.72rem;color:var(--tl);letter-spacing:.05em;}
.main-breadcrumb span{color:var(--or);}
.main-actions{display:flex;gap:.6rem;}
.btn-prev,.btn-next{padding:.5rem 1.2rem;border-radius:3px;font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:none;}
.btn-prev{background:var(--cr);color:var(--td);border:1px solid var(--bo);}
.btn-prev:hover{background:var(--bo);}
.btn-next{background:var(--vp);color:#fff;}
.btn-next:hover{background:var(--vm);}

/* CONTENT */
.lesson-content{padding:32px 40px;max-width:860px;margin:0 auto;width:100%;}
.lesson-badge{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);margin-bottom:.8rem;display:block;}
.lesson-title{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:300;color:var(--vp);margin-bottom:.6rem;line-height:1.2;}
.lesson-intro{font-size:.95rem;color:var(--td);line-height:1.85;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--bo);}
.lesson-body{font-size:.93rem;color:var(--td);line-height:1.9;}
.lesson-body h3{font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--vp);margin:1.8rem 0 .6rem;}
.lesson-body h4{font-size:.88rem;font-weight:500;color:var(--vp);margin:1.2rem 0 .4rem;text-transform:uppercase;letter-spacing:.06em;}
.lesson-body p{margin-bottom:1rem;}
.lesson-body ul{list-style:none;margin:.6rem 0 1rem;}
.lesson-body ul li{padding:.3rem 0 .3rem 1.2rem;position:relative;}
.lesson-body ul li::before{content:'—';position:absolute;left:0;color:var(--or);font-size:.8rem;}
.lesson-body strong{font-weight:500;color:var(--vp);}
.lesson-body em{font-style:italic;color:var(--vm);}

/* ENCADRÉ */
.encadre{background:var(--vc);border-left:3px solid var(--vm);border-radius:0 4px 4px 0;padding:1.2rem 1.4rem;margin:1.4rem 0;}
.encadre-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--vm);font-weight:500;margin-bottom:.5rem;}
.encadre p{font-size:.9rem;color:var(--td);margin:0;font-style:italic;}

/* ZOOM */
.zoom{background:var(--bl);border:1px solid var(--bo);border-radius:6px;padding:1.4rem;margin:1.4rem 0;border-top:3px solid var(--or);}
.zoom-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);margin-bottom:.5rem;}
.zoom p{font-size:.88rem;color:var(--td);line-height:1.8;margin-bottom:.5rem;}
.zoom p:last-child{margin-bottom:0;}

/* OBJECTIFS */
.objectifs{background:var(--bl);border:1px solid var(--bo);border-radius:6px;padding:1.4rem 1.6rem;margin-bottom:2rem;}
.objectifs-title{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--vp);font-weight:500;margin-bottom:1rem;}
.objectif-item{display:flex;align-items:flex-start;gap:.8rem;padding:.4rem 0;}
.objectif-num{width:22px;height:22px;border-radius:50%;background:var(--vc);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;color:var(--vp);flex-shrink:0;margin-top:2px;}
.objectif-text{font-size:.88rem;color:var(--td);flex:1;}

/* VIDEO */
.video-wrap{background:#000;border-radius:8px;overflow:hidden;margin:1.5rem 0;position:relative;aspect-ratio:16/9;}
.video-wrap iframe{width:100%;height:100%;border:none;}
.video-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--vp);color:rgba(255,255,255,.6);gap:.8rem;cursor:pointer;}
.video-play{width:56px;height:56px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;}
.video-play svg{margin-left:3px;}
.video-label{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;}
.video-note{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:.3rem;}

/* QUIZ */
.quiz-wrap{background:var(--bl);border:1px solid var(--bo);border-radius:8px;overflow:hidden;margin:2rem 0;}
.quiz-header{background:var(--vp);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.quiz-title{font-size:.85rem;font-weight:500;color:#fff;}
.quiz-count{font-size:.72rem;color:rgba(255,255,255,.5);}
.quiz-progress-bar{height:3px;background:rgba(255,255,255,.15);}
.quiz-progress-fill{height:100%;background:var(--or);transition:width .3s;}
.quiz-body{padding:20px;}
.q-num{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--or);margin-bottom:.5rem;}
.q-text{font-size:.92rem;font-weight:500;color:var(--tx);margin-bottom:1rem;line-height:1.5;}
.q-options{display:flex;flex-direction:column;gap:.5rem;}
.q-option{display:flex;align-items:flex-start;gap:.8rem;padding:.75rem 1rem;border:1px solid var(--bo);border-radius:5px;cursor:pointer;transition:all .2s;background:var(--cr);}
.q-option:hover{border-color:var(--vm);background:var(--vc);}
.q-option.selected{border-color:var(--vm);background:var(--vc);}
.q-option.correct{border-color:var(--vm);background:#e8f4f0;}
.q-option.wrong{border-color:#D85A30;background:#FAECE7;}
.q-option-letter{width:22px;height:22px;border-radius:50%;border:1px solid var(--bo);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:500;color:var(--tl);flex-shrink:0;}
.q-option.selected .q-option-letter,.q-option.correct .q-option-letter{background:var(--vm);border-color:var(--vm);color:#fff;}
.q-option.wrong .q-option-letter{background:#D85A30;border-color:#D85A30;color:#fff;}
.q-option-text{font-size:.87rem;color:var(--td);flex:1;}
.q-feedback{padding:.7rem 1rem;border-radius:4px;margin-top:.8rem;font-size:.82rem;display:none;}
.q-feedback.correct{background:#e8f4f0;color:var(--vm);display:block;}
.q-feedback.wrong{background:#FAECE7;color:#993C1D;display:block;}
.quiz-nav{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem;}
.quiz-btn{padding:.5rem 1.2rem;border-radius:3px;font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;}
.quiz-btn-next{background:var(--vp);color:#fff;}
.quiz-btn-next:hover{background:var(--vm);}
.quiz-btn-skip{background:var(--cr);color:var(--tl);border:1px solid var(--bo);}

/* RÉSULTAT QUIZ */
.quiz-result{padding:24px;text-align:center;display:none;}
.quiz-score{font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--vp);margin-bottom:.3rem;}
.quiz-score-label{font-size:.8rem;color:var(--tl);margin-bottom:1.2rem;}
.quiz-result-msg{font-size:.9rem;color:var(--td);margin-bottom:1.4rem;line-height:1.7;}
.quiz-retry{padding:.5rem 1.4rem;background:var(--cr);border:1px solid var(--bo);border-radius:3px;font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}

/* EXERCICE */
.exercice{background:var(--oc);border:1px solid #d4b870;border-radius:6px;padding:1.4rem 1.6rem;margin:1.5rem 0;}
.exercice-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);margin-bottom:.5rem;}
.exercice h4{font-size:.92rem;font-weight:500;color:var(--vp);margin-bottom:.6rem;}
.exercice p{font-size:.87rem;color:var(--td);line-height:1.75;}

/* MODULE INTRO */
.module-intro{padding:32px 40px;max-width:860px;margin:0 auto;width:100%;}
.module-num{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:.8rem;}
.module-title{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:300;color:var(--vp);margin-bottom:1rem;line-height:1.15;}
.module-desc{font-size:.95rem;color:var(--td);line-height:1.85;max-width:620px;margin-bottom:2rem;}
.module-lessons-list{display:grid;gap:.6rem;}
.module-lesson-card{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;background:var(--bl);border:1px solid var(--bo);border-radius:6px;cursor:pointer;transition:border-color .2s;}
.module-lesson-card:hover{border-color:var(--vm);}
.module-lesson-num{font-size:.72rem;color:var(--tl);min-width:60px;}
.module-lesson-name{font-size:.9rem;color:var(--tx);flex:1;}
.module-lesson-arrow{color:var(--tl);font-size:.8rem;}
.module-start{display:inline-block;margin-top:1.5rem;padding:.8rem 2rem;background:var(--vp);color:#fff;border:none;border-radius:3px;font-family:var(--sans);font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.module-start:hover{background:var(--vm);}

/* COMPLÉTION */
.completion-screen{padding:60px 40px;max-width:700px;margin:0 auto;text-align:center;}
.completion-icon{width:64px;height:64px;border-radius:50%;background:var(--vc);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;}
.completion-title{font-family:var(--serif);font-size:2rem;font-weight:300;color:var(--vp);margin-bottom:.8rem;}
.completion-text{font-size:.93rem;color:var(--td);line-height:1.8;margin-bottom:2rem;}


/* BOOK VISUAL */
.book-visual{width:100%;max-width:720px;margin:1.8rem auto;display:block;border-radius:8px;box-shadow:0 2px 16px rgba(11,61,46,.08);}
.book-visual-wrap{text-align:center;margin:2rem 0;}
.book-visual-caption{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tl);margin-top:.6rem;display:block;}
@media(max-width:860px){
  .lms{grid-template-columns:1fr;}
  .sb{position:relative;height:auto;}
  .lesson-content,.module-intro{padding:20px;}
}
</style>
</head>
<body>
<div class="lms">

<!-- SIDEBAR -->
<aside class="sb" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">Kéto<span>Progress</span>®</div>
    <div class="sb-subtitle">Formation Psycho-Nutrition</div>
  </div>
  <div class="sb-progress-wrap">
    <div class="sb-progress-label">Progression globale</div>
    <div class="sb-progress-bar"><div class="sb-progress-fill" id="global-bar" style="width:0%"></div></div>
    <div class="sb-progress-pct" id="global-pct">0% complété</div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-cert">
    <button class="sb-cert-btn" id="cert-btn" onclick="showCertificate()">Obtenir mon certificat</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="main-header">
    <div class="main-breadcrumb" id="breadcrumb">Formation · <span>Bienvenue</span></div>
    <div class="main-actions">
      <button class="btn-prev" onclick="navigate(-1)">← Précédent</button>
      <button class="btn-next" onclick="navigate(1)">Suivant →</button>
    </div>
  </div>
  <div id="content-area"></div>
</main>

</div>

<script>
// ═══════════════════════════════════════════════════
// DONNÉES DE LA FORMATION
// ═══════════════════════════════════════════════════
const FORMATION = {
  modules: [
    {
      id: 'm1',
      titre: 'Module 1',
      nom: 'Fondements de la méthode',
      description: 'Ce module pose les bases de l\'approche psycho-métabolique : l\'articulation entre énergie psychique et énergie biologique, les mécanismes du bio-métabolisme, et la posture du praticien.',
      lecons: [
        {
          id: 'l1_intro',
          titre: 'Introduction',
          nom: 'L\'approche psycho-métabolique',
          type: 'content',
          video: true,
          videoUrl: '', // Remplacer par l'URL YouTube de la vidéo
          content: `
            <div class="objectifs">
              <div class="objectifs-title">Objectifs pédagogiques du Module 1</div>
              <div class="objectif-item"><div class="objectif-num">1</div><div class="objectif-text">Distinguer les concepts d'énergie psychique et d'énergie biologique dans l'accompagnement nutritionnel</div></div>
              <div class="objectif-item"><div class="objectif-num">2</div><div class="objectif-text">Identifier les interactions entre métabolisme et psychisme chez un client</div></div>
              <div class="objectif-item"><div class="objectif-num">3</div><div class="objectif-text">Reconnaître les signes de déséquilibre psycho-métabolique (compulsions, fatigue, inflammation)</div></div>
              <div class="objectif-item"><div class="objectif-num">4</div><div class="objectif-text">Adopter une posture professionnelle d'accompagnement non-contrôlante</div></div>
              <div class="objectif-item"><div class="objectif-num">5</div><div class="objectif-text">Expliquer les fondements du sevrage progressif des glucides à un client</div></div>
            </div>
            <h3>Métapsychologie — L'énergie psychique</h3>
            <p>La métapsychologie s'intéresse aux forces inconscientes qui animent la vie psychique : pulsions, affects, désirs, refoulements et mécanismes de défense.</p>
            <p>L'énergie psychique circule à travers les pensées, les émotions et les comportements, selon un principe de tension et de décharge.</p>
            <div class="encadre">
              <div class="encadre-title">Principe fondateur</div>
              <p>Lorsqu'elle est bloquée par le refoulement, la peur ou la répétition, elle se transforme en tension interne, pouvant s'exprimer dans le corps. Lorsqu'elle est transformée par la symbolisation, elle devient énergie vitale disponible.</p>
            </div>
            <h3>Métabolisme — L'énergie biologique</h3>
            <p>Le métabolisme représente l'ensemble des réactions chimiques et hormonales qui transforment les nutriments en énergie utilisable par le corps. Cette énergie biologique provient essentiellement du glucose, des lipides et, dans certains états physiologiques, des corps cétoniques.</p>
            <p>Lorsque le métabolisme est perturbé — par un excès de sucres, une alimentation désorganisée ou un stress chronique — il perd sa flexibilité. Les excès provoquent une inflammation silencieuse, tandis que les carences prolongées entraînent fatigue et perte de régulation hormonale.</p>
            <h3>Équilibre vital — L'union du psychique et du biologique</h3>
            <p>L'équilibre vital correspond à la rencontre entre l'homéostasie métabolique et l'harmonie psychique. Il s'agit d'un état de circulation libre de l'énergie, où ni le corps ni le psychisme ne dominent, mais se répondent.</p>
            <div class="zoom">
              <div class="zoom-label">Point clé</div>
              <p>Cette approche ne repose pas sur une logique de régime, mais sur une reconnexion entre la biologie du corps et la dynamique du psychisme. Le sevrage progressif des glucides est au cœur de cette démarche — loin de toute restriction brutale.</p>
            </div>
            <div class="book-visual-wrap">
              <img src="./assets/formation/image3.png" class="book-visual" alt="Visuel formation KétoProgress" loading="lazy">
              <span class="book-visual-caption">L'énergie biologique : glucose → lipides → cétones</span>
            </div>
          `
        },
        {
          id: 'l1_bio',
          titre: 'Leçon 2',
          nom: 'Le Bio-métabolisme',
          type: 'content',
          video: true,
          videoUrl: '',
          content: `
            <h3>Le Bio-métabolisme — rappel professionnel et application pratique</h3>
            <p>Le domaine bio-métabolique regroupe l'ensemble des mécanismes biologiques impliqués dans la production, l'utilisation et la régulation de l'énergie. Dans le cadre de cette formation, il est abordé dans une logique fonctionnelle, permettant au praticien de comprendre les interactions entre alimentation, hormones et équilibre énergétique.</p>
            <h3>A. Régulation glycémique</h3>
            <p>La régulation glycémique correspond à la capacité du corps à maintenir un taux de glucose stable dans le sang.</p>
            <ul>
              <li><strong>Glycémie</strong> — Taux de glucose circulant dans le sang. Sa stabilité est essentielle pour maintenir une énergie constante et éviter les variations de l'appétit.</li>
              <li><strong>Insuline</strong> — Hormone produite par le pancréas permettant au glucose d'entrer dans les cellules. Elle favorise le stockage de l'énergie.</li>
              <li><strong>Glucagon</strong> — Hormone complémentaire de l'insuline, permettant la libération du glucose stocké et la mobilisation des réserves énergétiques.</li>
              <li><strong>Résistance à l'insuline</strong> — Diminution de la sensibilité des cellules à l'insuline, entraînant une élévation chronique de la glycémie.</li>
            </ul>
            <h3>B. Métabolisme lipidique</h3>
            <ul>
              <li><strong>Corps cétoniques</strong> — Molécules produites par le foie à partir des lipides lorsque l'apport en glucides est réduit. Source d'énergie alternative pour le cerveau et les muscles.</li>
              <li><strong>Flexibilité métabolique</strong> — Capacité du corps à utiliser alternativement le glucose ou les lipides comme source d'énergie. Développer cette flexibilité permet de stabiliser l'énergie et de réduire la dépendance au glucose.</li>
            </ul>
            <h3>C. Régulation hormonale globale</h3>
            <ul>
              <li><strong>Cortisol</strong> — Hormone du stress influençant la glycémie. Un déséquilibre peut favoriser les compulsions alimentaires.</li>
              <li><strong>Leptine</strong> — Hormone de la satiété, indiquant au cerveau que les réserves énergétiques sont suffisantes.</li>
              <li><strong>Ghréline</strong> — Hormone de la faim, stimulant l'appétit en fonction des besoins énergétiques.</li>
            </ul>
            <h3>D. Neurobiologie alimentaire</h3>
            <p>Les comportements alimentaires sont influencés par des mécanismes neurobiologiques. Une stimulation répétée du circuit de récompense (dopamine, sérotonine) peut favoriser des comportements alimentaires automatiques et répétitifs.</p>
            <div class="encadre">

// ÉTAT DE LA FORMATION
// ═══════════════════════════════════════════════════
let state = {
  currentModule: 0,
  currentLesson: -1, // -1 = intro module
  completed: new Set(),
  quizScores: {}
};

// Aplatir toutes les leçons
function allLessons() {
  const flat = [];
  FORMATION.modules.forEach((m, mi) => {
    flat.push({ type: 'module-intro', moduleIdx: mi });
    m.lecons.forEach((l, li) => flat.push({ type: 'lesson', moduleIdx: mi, lessonIdx: li }));
  });
  return flat;
}

let flatCursor = 0;
const flat = allLessons();

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function navigate(dir) {
  flatCursor = Math.max(0, Math.min(flat.length - 1, flatCursor + dir));
  renderCurrent();
}

function goToLesson(moduleIdx, lessonIdx) {
  flatCursor = flat.findIndex(f =>
    lessonIdx === -1
      ? f.type === 'module-intro' && f.moduleIdx === moduleIdx
      : f.type === 'lesson' && f.moduleIdx === moduleIdx && f.lessonIdx === lessonIdx
  );
  if (flatCursor < 0) flatCursor = 0;
  renderCurrent();
}

function renderCurrent() {
  const cur = flat[flatCursor];
  if (cur.type === 'module-intro') renderModuleIntro(cur.moduleIdx);
  else renderLesson(cur.moduleIdx, cur.lessonIdx);
  renderSidebar();
  updateProgress();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════
// RENDU INTRO MODULE
// ═══════════════════════════════════════════════════
function renderModuleIntro(mi) {
  const m = FORMATION.modules[mi];
  document.getElementById('breadcrumb').innerHTML = `Formation · <span>${m.titre}</span>`;
  const ca = document.getElementById('content-area');
  ca.innerHTML = `
    <div class="module-intro">
      <div class="module-num">${m.titre} sur ${FORMATION.modules.length}</div>
      <h1 class="module-title">${m.nom}</h1>
      <p class="module-desc">${m.description}</p>
      <div class="module-lessons-list">
        ${m.lecons.map((l, li) => `
          <div class="module-lesson-card" onclick="goToLesson(${mi},${li})">
            <div class="module-lesson-num">${l.titre}</div>
            <div class="module-lesson-name">${l.nom}</div>
            <div class="module-lesson-arrow">${state.completed.has(m.id+'_'+l.id) ? '✓' : '→'}</div>
          </div>
        `).join('')}
      </div>
      <button class="module-start" onclick="goToLesson(${mi},0)">Commencer le module →</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
// RENDU LEÇON
// ═══════════════════════════════════════════════════
function renderLesson(mi, li) {
  const m = FORMATION.modules[mi];
  const l = m.lecons[li];
  const key = m.id + '_' + l.id;
  state.completed.add(key);
  document.getElementById('breadcrumb').innerHTML = `${m.titre} · <span>${l.nom}</span>`;
  const ca = document.getElementById('content-area');

  if (l.type === 'quiz') {
    renderQuiz(ca, m, l, key);
    return;
  }

  const videoHtml = l.video ? `
    <div class="video-wrap">
      ${l.videoUrl
        ? `<iframe src="${l.videoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
        : `<div class="video-placeholder">
            <div class="video-play"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 3l11 6-11 6V3z" fill="white"/></svg></div>
            <div class="video-label">Vidéo à venir</div>
            <div class="video-note">Collez l'URL YouTube dans le code source — champ videoUrl</div>
          </div>`
      }
    </div>
  ` : '';

  ca.innerHTML = `
    <div class="lesson-content">
      <span class="lesson-badge">${m.titre} · ${l.titre}</span>
      <h1 class="lesson-title">${l.nom}</h1>
      ${videoHtml}
      <div class="lesson-body">${l.content}</div>
      <div style="margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--bo);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:.78rem;color:var(--tl);">Leçon complétée ✓</span>
        <button class="module-start" onclick="navigate(1)">Leçon suivante →</button>
      </div>
    </div>
  `;
}

            <div class="q-feedback" id="q-feedback"></div>
            <div class="quiz-nav">
              <button class="quiz-btn quiz-btn-next" id="next-btn" onclick="nextQ()" style="display:none;">Question suivante →</button>
            </div>
          </div>
        </div>
      </div>
    `;
    answered = false;
  }

  window.selectOpt = function(i) {
    if (answered) return;
    answered = true;
    const q = l.questions[qIdx];
    const fb = document.getElementById('q-feedback');
    document.querySelectorAll('.q-option').forEach((el,idx) => {
      if (idx === q.correct) el.classList.add('correct');
      else if (idx === i && i !== q.correct) el.classList.add('wrong');
    });
    if (i === q.correct) {
      score++;
      fb.className = 'q-feedback correct';
      fb.textContent = '✓ Bonne réponse ! ' + q.feedback;
    } else {
      fb.className = 'q-feedback wrong';
      fb.textContent = '✗ ' + q.feedback;
    }
    document.getElementById('next-btn').style.display = 'block';
  };

  window.nextQ = function() { qIdx++; showQ(); };

  function showResult() {
    const pct = Math.round((score / l.questions.length) * 100);
    state.quizScores[key] = pct;
    const msg = pct >= 80
      ? 'Excellent ! Vous maîtrisez bien les concepts de ce module. Vous pouvez passer à la suite.'
      : pct >= 60
      ? 'Bon travail. Quelques points méritent d\'être revus avant de continuer.'
      : 'Prenez le temps de relire les leçons de ce module avant de passer à la suite.';
    ca.innerHTML = `
      <div class="lesson-content">
        <span class="lesson-badge">${m.titre} · ${l.titre}</span>
        <h1 class="lesson-title">Résultats du quiz</h1>
        <div class="quiz-wrap">
          <div class="quiz-header"><span class="quiz-title">${l.nom}</span></div>
          <div class="quiz-body" style="text-align:center;padding:2rem;">
            <div style="font-family:var(--serif);font-size:3.5rem;font-weight:300;color:${pct>=80?'var(--vm)':pct>=60?'var(--or)':'#D85A30'};">${pct}%</div>
            <div style="font-size:.8rem;color:var(--tl);margin-bottom:1rem;">${score} bonne${score>1?'s':''} réponse${score>1?'s':''} sur ${l.questions.length}</div>
            <div style="font-size:.9rem;color:var(--td);margin-bottom:1.5rem;line-height:1.7;">${msg}</div>
            <div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;">
              <button class="quiz-retry" onclick="renderQuiz(document.getElementById('content-area'),FORMATION.modules[${FORMATION.modules.indexOf(m)}],FORMATION.modules[${FORMATION.modules.indexOf(m)}].lecons[${m.lecons.indexOf(l)}],'${key}')">Recommencer</button>
              <button class="module-start" onclick="navigate(1)">Module suivant →</button>
            </div>
          </div>
        </div>
      </div>
    `;
    updateProgress();
  }

  showQ();
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sb-nav');
  const cur = flat[flatCursor];
  nav.innerHTML = FORMATION.modules.map((m, mi) => {
    const isCurrentModule = cur.moduleIdx === mi;
    const allDone = m.lecons.every(l => state.completed.has(m.id+'_'+l.id));
    const anyDone = m.lecons.some(l => state.completed.has(m.id+'_'+l.id));
    const iconClass = allDone ? 'done' : anyDone ? 'current' : isCurrentModule ? 'current' : 'locked';
    const iconText = allDone ? '✓' : mi+1;

    return `
      <div class="sb-module">
        <button class="sb-module-btn ${isCurrentModule?'active':''}" onclick="goToLesson(${mi},-1)">
          <div class="sb-module-icon ${iconClass}">${iconText}</div>
          <span class="sb-module-name">${m.titre} — ${m.nom}</span>
        </button>
        ${isCurrentModule ? `
          <div class="sb-lessons">
            ${m.lecons.map((l,li) => {
              const key = m.id+'_'+l.id;
              const isCurLesson = cur.type==='lesson' && cur.moduleIdx===mi && cur.lessonIdx===li;
              const isDone = state.completed.has(key);
              return `
                <button class="sb-lesson ${isCurLesson?'active':''} ${isDone&&!isCurLesson?'done':''}" onclick="goToLesson(${mi},${li})">
                  <div class="sb-lesson-dot"></div>
                  ${l.nom}
                </button>
              `;
            }).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════════════════
// PROGRESSION
// ═══════════════════════════════════════════════════
function updateProgress() {
  const total = FORMATION.modules.reduce((acc, m) => acc + m.lecons.length, 0);
  const done = state.completed.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = pct + '% complété';
  const certBtn = document.getElementById('cert-btn');
  if (pct >= 100) certBtn.classList.add('enabled');
}

function showCertificate() {
  const pct = Math.round((state.completed.size / FORMATION.modules.reduce((a,m)=>a+m.lecons.length,0)) * 100);
  if (pct < 100) {
    alert('Complétez l\'ensemble des modules pour obtenir votre certificat.');
    return;
  }
  const ca = document.getElementById('content-area');
  const today = new Date().toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'});
  ca.innerHTML = `
    <div class="lesson-content" style="text-align:center;padding:60px 40px;">
      <div style="border:2px solid var(--or);border-radius:8px;padding:3rem;background:#fff;max-width:700px;margin:0 auto;">
        <div style="font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:1.5rem;">Certificat de formation</div>
        <div style="font-family:var(--serif);font-size:2rem;color:var(--vp);margin-bottom:.5rem;">Formation à la Psycho-Nutrition</div>
        <div style="font-size:.9rem;color:var(--tl);margin-bottom:2rem;">Approche psycho-métabolique progressive</div>
        <div style="font-family:var(--serif);font-size:1.1rem;color:var(--td);margin-bottom:.5rem;font-style:italic;">certifie que</div>
        <div style="font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--vp);margin-bottom:.5rem;">[Nom du praticien]</div>
        <div style="font-size:.88rem;color:var(--td);line-height:1.8;max-width:500px;margin:0 auto 2rem;">a suivi et validé l'ensemble des 4 modules de la formation à la Psycho-Nutrition, délivré par Patricia Rousset, psychanalyste et fondatrice de la méthode KétoProgress®.</div>
        <div style="font-size:.78rem;color:var(--tl);margin-bottom:1.5rem;">${today}</div>
        <div style="display:flex;justify-content:space-between;padding-top:1.5rem;border-top:1px solid var(--bo);">
          <div style="text-align:left;"><div style="font-size:.68rem;color:var(--tl);letter-spacing:.08em;text-transform:uppercase;">Formatrice</div><div style="font-family:var(--serif);font-size:1rem;color:var(--vp);margin-top:.3rem;">Patricia Rousset</div><div style="font-size:.72rem;color:var(--tl);">Psychanalyste · KétoProgress®</div></div>
          <div style="text-align:right;"><div style="font-size:.68rem;color:var(--tl);letter-spacing:.08em;text-transform:uppercase;">Référence</div><div style="font-family:var(--serif);font-size:1rem;color:var(--vp);margin-top:.3rem;">KP-FORM-2026</div><div style="font-size:.72rem;color:var(--tl);">INPI · N°5107997</div></div>
        </div>
      </div>
      <button class="module-start" style="margin-top:1.5rem;" onclick="window.print()">Imprimer le certificat</button>
    </div>
  `;
  document.getElementById('breadcrumb').innerHTML = `Formation · <span>Certificat</span>`;
}

// INIT
renderCurrent();
</script>
</body>
</html>
